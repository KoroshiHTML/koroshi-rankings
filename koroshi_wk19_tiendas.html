<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TIENDAS + WEB · WK19</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--sur:#161616;--card:#1a1a1a;--bdr:#282828;--ah:#e8c44a;--am:#e84a7a;--wc:#34d399;--text:#f0f0f0;--mu:#666}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh}
header{background:var(--sur);border-bottom:1px solid var(--bdr);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:10px}
.logo{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:4px}
.logo em{color:var(--ah);font-style:normal}
.hm{font-size:9px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase}
.tabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--sur);padding:0 26px;overflow-x:auto}
.tab{padding:10px 18px;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--mu);transition:all .15s;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--ah)}
.tab.active.m{border-bottom-color:var(--am)}
.tab#tab-coming.active{border-bottom-color:var(--wc)}
.controls{padding:11px 26px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--bdr)}
.btn-grp{display:flex;gap:3px;flex-wrap:wrap}
.btn{padding:6px 14px;border:1px solid var(--bdr);background:transparent;color:var(--mu);font-family:"DM Sans",sans-serif;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:all .15s}
.btn:hover{border-color:#555;color:var(--text)}
.btn.on-h{background:var(--ah);border-color:var(--ah);color:#000}
.btn.on-m{background:var(--am);border-color:var(--am);color:#fff}
.btn.on-ch{background:#2a2a2a;border-color:#555;color:var(--text)}
.sep{width:1px;background:var(--bdr);height:24px;margin:0 4px;align-self:center}
.badge{padding:4px 12px;border-radius:2px;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:3px;margin-left:auto}
.bh{background:var(--ah);color:#000}.bm{background:var(--am);color:#fff}
.pdf-btn{padding:6px 12px;border:1px solid #444;background:#222;color:var(--text);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:2px;font-family:"DM Sans",sans-serif}
.store-panel{padding:10px 26px;border-bottom:1px solid var(--bdr);display:none}
.store-select{background:var(--sur);color:var(--text);border:1px solid var(--bdr);padding:7px 12px;font-family:"DM Sans",sans-serif;font-size:12px;border-radius:2px;width:280px;cursor:pointer}
.store-select option{background:#111}
.store-controls{padding:10px 26px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--bdr);background:var(--sur)}
.store-subtabs{display:flex;border-bottom:1px solid var(--bdr);background:var(--sur);padding:0 26px;overflow-x:auto}
.stab{padding:9px 16px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;color:var(--mu);transition:all .15s;white-space:nowrap}
.stab.active{color:var(--text);border-bottom-color:var(--ah)}
.stab.active.m{border-bottom-color:var(--am)}
.stab.active.wc{border-bottom-color:var(--wc)}
.summary{padding:9px 26px;display:flex;gap:20px;font-size:10px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;background:var(--sur);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
.summary strong{color:var(--text);font-size:11px}
.spark-wrap{padding:9px 26px 5px;border-bottom:1px solid var(--bdr)}
.spark-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.spark-bars{display:flex;gap:2px;align-items:flex-end;height:28px}
.sbar{flex:1;border-radius:1px 1px 0 0;min-width:4px;position:relative}
.sbar::after{content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:3px 7px;font-size:9px;white-space:nowrap;border-radius:2px;pointer-events:none;z-index:99;opacity:0;transition:opacity .15s}
.sbar:hover::after{opacity:1}
.coming-banner{padding:10px 26px;background:rgba(52,211,153,.07);border-bottom:1px solid rgba(52,211,153,.2);display:none;align-items:center;gap:12px}
.coming-banner em{font-style:normal;font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:2px;color:var(--wc)}
.coming-banner span{font-size:10px;color:var(--mu);letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1px;background:var(--bdr)}
.card{background:var(--card);position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.6);z-index:2}
.card-img-wrap{width:100%;aspect-ratio:3/4;background:#1e1e1e;position:relative;overflow:hidden}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.rank{position:absolute;top:8px;left:8px;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:14px;z-index:3}
.r1{background:#FFD700;color:#000;width:34px;height:34px;font-size:16px}
.r2{background:#C0C0C0;color:#000}.r3{background:#CD7F32;color:#000}
.rn{background:rgba(0,0,0,.8);color:var(--mu);border:1px solid #333}
.ly-tag{position:absolute;top:8px;right:8px;background:rgba(52,211,153,.85);color:#000;font-size:8px;font-weight:700;letter-spacing:1px;padding:3px 6px;border-radius:2px;z-index:3;text-transform:uppercase}
.card-body{padding:9px 11px 11px}
.card-ref{font-size:9px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.card-name{font-size:10px;font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3;text-transform:uppercase}
.card-fam{font-size:9px;color:var(--mu);margin-bottom:7px;text-transform:uppercase}
.card-stats{display:flex;justify-content:space-between;align-items:flex-end}
.sl{font-size:8px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
.sv{font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:.5px}
.sv.eh{color:var(--ah)}.sv.em{color:var(--am)}.sv.ewc{color:var(--wc)}
.sv.un{color:var(--text);font-size:12px}
.card-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--bdr)}
.cbh{height:2px;background:var(--ah)}.cbm{height:2px;background:var(--am)}.cbwc{height:2px;background:var(--wc)}
.fam-legend{padding:9px 26px;display:flex;gap:14px;font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--bdr);background:var(--sur);align-items:center;flex-wrap:wrap}
.ldot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.fam-sec{margin-bottom:1px}
.fam-hdr{padding:12px 26px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--bdr);transition:background .15s;border-left:4px solid transparent;position:relative;overflow:hidden}
.fam-hdr:hover{background:#1e1e1e}
.fam-hdr.p80h{border-left-color:var(--ah);background:rgba(232,196,74,.04)}
.fam-hdr.p80m{border-left-color:var(--am);background:rgba(232,74,122,.04)}
.fam-hdr.p80wc{border-left-color:var(--wc);background:rgba(52,211,153,.04)}
.fam-bg{position:absolute;left:0;top:0;bottom:0;pointer-events:none}
.fam-left{display:flex;align-items:center;gap:12px;position:relative}
.fam-name{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:2px}
.fam-name.dim{color:var(--mu)}
.fam-meta{display:flex;flex-direction:column;gap:2px}
.fam-pct{font-size:10px;letter-spacing:1px}
.fam-tag{font-size:8px;letter-spacing:1.5px;padding:2px 5px;border-radius:2px}
.tag-h{background:rgba(232,196,74,.15);color:var(--ah)}
.tag-m{background:rgba(232,74,122,.15);color:var(--am)}
.tag-wc{background:rgba(52,211,153,.15);color:var(--wc)}
.fam-right{display:flex;align-items:center;gap:10px;position:relative}
.fam-eur{font-family:"Bebas Neue",sans-serif;font-size:15px}
.fam-eur2{font-size:10px;color:var(--mu)}
.tog{font-size:10px;color:var(--mu);transition:transform .2s;margin-left:8px}
.fam-body{display:none;border-bottom:1px solid var(--bdr)}
.fam-body.open{display:block}
.no-data{padding:50px;text-align:center;color:var(--mu);font-size:13px;grid-column:1/-1}
.no-store{padding:60px 26px;text-align:center;color:var(--mu);font-size:14px}
#view-channel,#view-family,#view-coming{display:none}
@media print{
  body{background:#fff;color:#111}
  header,.tabs,.controls,.store-panel,.store-controls,.store-subtabs,.summary,.spark-wrap,.fam-legend,.coming-banner{display:none!important}
  .ph{display:flex!important}
  .card{background:#f5f5f5;border:1px solid #ddd;break-inside:avoid}
  .fam-hdr{background:#f0f0f0!important}
  .fam-body{display:block!important}
  .grid{gap:4px;background:#ccc}
  .rank{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  @page{margin:12mm;size:A4 landscape}
}
.ph{display:none;justify-content:space-between;padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid #111}
.ph-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:4px}
.ph-meta{font-size:10px;color:#555;text-align:right;line-height:1.8}
</style>
</head>

const CHL={'STORES':'TIENDAS','WEB':'WEB','ONLINE':'TOTAL','Zalando':'Zalando','About You':'About You'};
const A=0,C=1,N=2,F=3,UT=4,ET=5,UL=6,EL=7,PH=8;
const CA=0,CC=1,CN=2,CUT=3,CET=4,CUL=5,CEL=6;
const FF=0,FET=1,FEL=2,FPCT=3,FI80=4,FIT=5;
let curSexo="HOMBRE",curChannel="STORES",curStore=null,curView="channel",storeSexo="HOMBRE",storeTab="top20";
const fmt=n=>new Intl.NumberFormat("es-ES",{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fmtI=n=>new Intl.NumberFormat("es-ES").format(n);
const purl=(a,c)=>`https://koroshishop.com/cdn/shop/files/${a}_${c}_1.jpg`;
const el=id=>document.getElementById(id);
function showSpark(v){el("spark-wrap").style.display=v?"block":"none";}
function showCB(v){const cb=el("coming-banner");if(cb)cb.style.display=v?"flex":"none";}
function switchView(v){
  curView=v;
  ["channel","family","coming","store"].forEach(id=>{
    const e=el("view-"+id);if(e)e.style.display=id===v?"block":"none";
    const t=el("tab-"+id);if(t){t.classList.toggle("active",id===v);t.classList.toggle("m",id===v&&curSexo==="MUJER");}
  });
  const gc=el("global-controls"),sp=el("store-panel");
  if(gc)gc.style.display=v==="store"?"none":"flex";
  if(sp)sp.style.display=v==="store"?"block":"none";
  el("summary").style.display=v==="store"?"none":"flex";
  showSpark(v==="channel");showCB(v==="coming");
  const fl=el("fleg");if(fl)fl.style.display=v==="family"?"flex":"none";
  const cl=el("cleg");if(cl)cl.style.display=v==="coming"?"flex":"none";
  render();
}
function setSexo(s){
  curSexo=s;
  document.querySelectorAll("#sg .btn").forEach(b=>{b.className="btn";if(b.textContent.includes("MEN")&&s==="HOMBRE")b.className="btn on-h";if(b.textContent.includes("WOMEN")&&s==="MUJER")b.className="btn on-m";});
  const b=el("badge");b.textContent=s==="HOMBRE"?"MEN":"WOMEN";b.className="badge "+(s==="HOMBRE"?"bh":"bm");
  ["tab-channel","tab-family","tab-coming"].forEach(id=>{const t=el(id);if(t&&t.classList.contains("active"))t.classList.toggle("m",s==="MUJER");});
  render();
}
function setChannel(ch){
  curChannel=ch;
  document.querySelectorAll("#chg .btn").forEach(b=>{b.className=b.textContent.trim()===ch||b.textContent.trim()===(CHL[ch]||ch)?"btn on-ch":"btn";});
  render();
}
function setStore(v){curStore=v||null;storeSexo="HOMBRE";storeTab="top20";renderStore();}
function setStoreSexo(s){storeSexo=s;renderStore();}
function setStoreTab(t){storeTab=t;renderStore();}
function cardFull(item,rank,isH,mode){
  const ec=mode==="wc"?"ewc":isH?"eh":"em",bc=mode==="wc"?"cbwc":isH?"cbh":"cbm";
  const eur=mode==="wc"?item[EL]:item[ET],un=mode==="wc"?item[UL]:item[UT];
  const pct=Math.round((eur/(window._maxEur||eur))*100);
  const rc=rank===1?"r1":rank===2?"r2":rank===3?"r3":"rn";
  const lyTag=mode==="wc"?'<div class="ly-tag">LY WK20+21</div>':"";
  const fam=item[F]?`<div class="card-fam">${item[F]}</div>`:"";
  return `<div class="card"><div class="card-img-wrap"><div class="rank ${rc}">${rank}</div>${lyTag}<img class="card-img" src="${item[PH]||purl(item[A],item[C])}" loading="lazy" onerror="this.style.display='none'"></div><div class="card-body"><div class="card-ref">${item[A]} · ${item[C]}</div><div class="card-name">${item[N]}</div>${fam}<div class="card-stats"><div><div class="sl">${mode==="wc"?"LY WK20+21":"TY WK19"}</div><div class="sv ${ec}">${fmt(eur)}</div></div><div style="text-align:right"><div class="sl">Units</div><div class="sv un">${fmtI(un)}</div></div></div></div><div class="card-bar"><div class="${bc}" style="width:${pct}%"></div></div></div>`;
}
function cardCompact(item,rank,isH,mode){
  const ec=mode==="wc"?"ewc":isH?"eh":"em",bc=mode==="wc"?"cbwc":isH?"cbh":"cbm";
  const eur=mode==="wc"?item[CEL]:item[CET],un=mode==="wc"?item[CUL]:item[CUT];
  const pct=Math.round((eur/(window._maxEur||eur))*100);
  const rc=rank===1?"r1":rank===2?"r2":rank===3?"r3":"rn";
  const lyTag=mode==="wc"?'<div class="ly-tag">LY WK20+21</div>':"";
  return `<div class="card"><div class="card-img-wrap"><div class="rank ${rc}">${rank}</div>${lyTag}<img class="card-img" src="${purl(item[CA],item[CC])}" loading="lazy" onerror="this.style.display='none'"></div><div class="card-body"><div class="card-ref">${item[CA]} · ${item[CC]}</div><div class="card-name">${item[CN]}</div><div class="card-stats"><div><div class="sl">${mode==="wc"?"LY WK20+21":"TY WK19"}</div><div class="sv ${ec}">${fmt(eur)}</div></div><div style="text-align:right"><div class="sl">Units</div><div class="sv un">${fmtI(un)}</div></div></div></div><div class="card-bar"><div class="${bc}" style="width:${pct}%"></div></div></div>`;
}
function updateSummary(label,eur,units){
  const u=units>0?`<span>Units: <strong>${fmtI(units)}</strong></span>`:"";
  el("summary").innerHTML=`<span>View: <strong>${label}</strong></span><span>Market: <strong>${curSexo==="HOMBRE"?"MEN":"WOMEN"}</strong></span><span>Total €: <strong>${fmt(eur)} €</strong></span>${u}`;
}
function updateSpark(items,mode,compact){
  const ei=compact?(mode==="wc"?CEL:CET):(mode==="wc"?EL:ET);
  const vals=items.map(i=>i[ei]),maxE=vals.length?vals[0]:1;
  const col=mode==="wc"?"var(--wc)":curSexo==="HOMBRE"?"var(--ah)":"var(--am)";
  el("sbars").innerHTML=vals.map((v,i)=>{const p=Math.max(Math.round((v/maxE)*100),4);return `<div class="sbar" style="height:${p}%;background:${col};opacity:${0.35+p/130}" data-tip="#${i+1} ${items[i][compact?CA:A]} · ${fmt(v)}€"></div>`;}).join("");
}
function buildLegend(mode,isH){
  const col=mode==="wc"?"var(--wc)":isH?"var(--ah)":"var(--am)";
  return `<span><span class="ldot" style="background:${col}"></span>Families driving 80% of sales</span><span><span class="ldot" style="background:#444"></span>Remaining families</span><span style="color:var(--mu);margin-left:auto;font-size:9px">↕ Click to expand</span>`;
}
function buildFamHTML(fams,mode,isH,compact){
  const tagCls=mode==="wc"?"tag-wc":isH?"tag-h":"tag-m";
  const hdrCls=mode==="wc"?"p80wc":isH?"p80h":"p80m";
  const maxFam=fams.length?(mode==="wc"?fams[0][FEL]:fams[0][FET]):1;
  let html="";
  fams.forEach(fam=>{
    const eur=mode==="wc"?fam[FEL]:fam[FET],eurO=mode==="wc"?fam[FET]:fam[FEL];
    const lbl=mode==="wc"?"LY WK20+21":"TY WK19",lblO=mode==="wc"?"TY WK19":"LY WK20+21";
    const pctFill=Math.round((eur/maxFam)*100),is80=fam[FI80];
    const pctCol=mode==="wc"?"var(--wc)":isH?"var(--ah)":"var(--am)";
    const bgCol=mode==="wc"?"rgba(52,211,153,.04)":isH?"rgba(232,196,74,.04)":"rgba(232,74,122,.04)";
    const tag=is80?`<span class="fam-tag ${tagCls}">TOP 80%</span>`:"";
    window._maxEur=fam[FIT].length?(mode==="wc"?fam[FIT][0][compact?CEL:EL]:fam[FIT][0][compact?CET:ET]):1;
    const cards=fam[FIT].map((it,i)=>compact?cardCompact(it,i+1,isH,mode):cardFull(it,i+1,isH,mode)).join("");
    html+=`<div class="fam-sec"><div class="fam-hdr${is80?" "+hdrCls:""}" onclick="toggleFam(this)"><div class="fam-bg" style="width:${pctFill}%;background:${is80?bgCol:"rgba(255,255,255,.01)"}"></div><div class="fam-left"><div class="fam-name${is80?"":" dim"}">${fam[FF]}</div><div class="fam-meta"><div class="fam-pct" style="color:${is80?pctCol:"var(--mu)"}">${fam[FPCT]}% of channel</div>${tag}</div></div><div class="fam-right"><div><div class="sl">${lbl}</div><div class="fam-eur" style="color:${is80?pctCol:"var(--mu)"}">${fmt(eur)} €</div><div class="fam-eur2">${lblO}: ${fmt(eurO)} €</div></div><div class="tog">▼</div></div></div><div class="fam-body"><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(165px,1fr))">${cards}</div></div></div>`;
  });
  return html||"<div class=no-data>No data</div>";
}
function renderStore(){
  const inner=el("store-inner");
  if(!curStore){inner.innerHTML="<div class=no-store>Select a store to see its ranking</div>";el("summary").style.display="none";showSpark(false);showCB(false);return;}
  const st=DATA.st[curStore];if(!st)return;
  const isH=storeSexo==="HOMBRE",stData=st[storeSexo],mc=isH?"":" m";
  el("summary").style.display="flex";
  const sexoHtml=`<div class="store-controls"><div class="btn-grp"><button class="btn ${isH?"on-h":""}" onclick="setStoreSexo('HOMBRE')">▲ MEN</button><button class="btn ${!isH?"on-m":""}" onclick="setStoreSexo('MUJER')">♀ WOMEN</button></div><div class="badge ${isH?"bh":"bm"}" style="margin-left:auto">${isH?"MEN":"WOMEN"}</div><button class="pdf-btn" onclick="doPrint()">⬇ PDF</button></div>`;
  const subTabHtml=`<div class="store-subtabs"><div class="stab${storeTab==="top20"?" active"+mc:""}" onclick="setStoreTab('top20')">Top 20</div><div class="stab${storeTab==="family"?" active"+mc:""}" onclick="setStoreTab('family')">By Family — WK19</div><div class="stab${storeTab==="wc"?" active wc":""}" onclick="setStoreTab('wc')">▶ What's Coming WK20+21</div></div>`;
  showCB(storeTab==="wc");
  if(storeTab==="top20"){
    showSpark(true);
    const items=stData?stData.t||[]:[]; window._maxEur=items.length?items[0][CET]:1;
    inner.innerHTML=sexoHtml+subTabHtml+`<div class="grid">${items.length?items.map((it,i)=>cardCompact(it,i+1,isH,"ty")).join(""):"<div class=no-data>No sales this week</div>"}</div>`;
    const tot=items.reduce((s,i)=>s+i[CET],0),tou=items.reduce((s,i)=>s+i[CUT],0);
    el("summary").innerHTML=`<span>Store: <strong>${st.n}</strong></span><span>Market: <strong>${isH?"MEN":"WOMEN"}</strong></span><span>Total €: <strong>${fmt(tot)} €</strong></span><span>Units: <strong>${fmtI(tou)}</strong></span>`;
    updateSpark(items,"ty",true);
  }else if(storeTab==="family"){
    showSpark(false);
    const fams=stData?stData.f||[]:[]; 
    inner.innerHTML=sexoHtml+subTabHtml+`<div class="fam-legend">${buildLegend("ty",isH)}</div><div>${buildFamHTML(fams,"ty",isH,true)}</div>`;
    const tot=fams.reduce((s,f)=>s+f[FET],0);
    el("summary").innerHTML=`<span>Store: <strong>${st.n}</strong></span><span>Market: <strong>${isH?"MEN":"WOMEN"}</strong></span><span>Total €: <strong>${fmt(tot)} €</strong></span>`;
  }else if(storeTab==="wc"){
    showSpark(false);
    const fams=stData?stData.w||[]:[]; 
    inner.innerHTML=sexoHtml+subTabHtml+`<div class="fam-legend">${buildLegend("wc",isH)}</div><div>${buildFamHTML(fams,"wc",isH,true)}</div>`;
    const tot=fams.reduce((s,f)=>s+f[FEL],0);
    el("summary").innerHTML=`<span>Store: <strong>${st.n}</strong></span><span>Market: <strong>${isH?"MEN":"WOMEN"}</strong></span><span>LY WK20+21 €: <strong>${fmt(tot)} €</strong></span>`;
  }
}
function render(){
  const isH=curSexo==="HOMBRE",lbl=CHL[curChannel]||curChannel;
  if(curView==="channel"){
    showSpark(true);showCB(false);el("summary").style.display="flex";
    const items=(DATA.ch[curChannel]&&DATA.ch[curChannel][curSexo])||[];
    window._maxEur=items.length?items[0][ET]:1;
    el("grid-ch").innerHTML=items.length?items.map((it,i)=>cardFull(it,i+1,isH,"ty")).join(""):"<div class=no-data>No data</div>";
    const tot=items.reduce((s,i)=>s+i[ET],0),tou=items.reduce((s,i)=>s+i[UT],0);
    updateSummary(lbl,tot,tou);updateSpark(items,"ty",false);
    el("ptitle").textContent="TOP 20 · WK19 · "+lbl;
    el("pmeta").textContent="Market: "+(isH?"MEN":"WOMEN")+" · Channel: "+lbl;
  }else if(curView==="family"){
    showSpark(false);showCB(false);el("summary").style.display="flex";
    const fams=(DATA.fty[curChannel]&&DATA.fty[curChannel][curSexo])||[];
    el("fleg").innerHTML=buildLegend("ty",isH);el("fam-secs").innerHTML=buildFamHTML(fams,"ty",isH,false);
    const tot=fams.reduce((s,f)=>s+f[FET],0);
    updateSummary("Families WK19 · "+lbl,tot,0);
    el("ptitle").textContent="FAMILIES · WK19 · "+lbl;
  }else if(curView==="coming"){
    showSpark(false);showCB(true);el("summary").style.display="flex";
    const fams=(DATA.wc[curChannel]&&DATA.wc[curChannel][curSexo])||[];
    el("cleg").innerHTML=buildLegend("wc",isH);el("coming-secs").innerHTML=buildFamHTML(fams,"wc",isH,false);
    const tot=fams.reduce((s,f)=>s+f[FEL],0);
    updateSummary("What's Coming WK20+21 · "+lbl,tot,0);
    el("ptitle").textContent="WHATS COMING · WK20+21 LY · "+lbl;
  }else if(curView==="store"){
    renderStore();
  }
}
function toggleFam(h){const b=h.nextElementSibling,t=h.querySelector(".tog");b.classList.toggle("open");t.style.transform=b.classList.contains("open")?"rotate(180deg)":"";}
function doPrint(){document.querySelectorAll(".fam-body").forEach(b=>b.classList.add("open"));window.print();}
if(DATA.sl){const sel=document.getElementById("store-select");DATA.sl.forEach(s=>{const o=document.createElement("option");o.value=s.id;o.textContent=s.name;sel.appendChild(o);});}
switchView("channel");
